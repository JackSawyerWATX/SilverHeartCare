version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  rewrites:
    - source: <^[^.]+$|\.(?!js$|css$|gif$|jpg$|jpeg$|png$|svg$|webp$|ico$|json$)([^.]+)$>
      target: /index.html
