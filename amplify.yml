version: 1

frontend:
  phases:
    preBuild:
      commands:
        - echo "Node version:"
        - node --version
        - echo "npm version:"
        - npm --version
    build:
      commands:
        - echo "Installing dependencies with npm..."
        - npm install
        - echo "Building application..."
        - npm run build
    postBuild:
      commands:
        - echo "Build completed successfully"
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
