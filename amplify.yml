version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

hosting:
  baseDirectory: dist
  rewrites:
    - source: <^[^.]+$|\.(?!css|js|gif|jpg|jpeg|png|svg|ico|webp|eot|otf|ttf|woff|woff2)$>
      target: /index.html
      status: 200
